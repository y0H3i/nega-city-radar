services:
  postgres:
    image: postgres:16
    container_name: deep-signal-radar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radar_password}
      POSTGRES_DB: ${POSTGRES_DB:-deep_signal_radar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radar} -d ${POSTGRES_DB:-deep_signal_radar}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
